name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: todoapp-rg
  ACR_NAME: ${{ secrets.ACR_NAME }}
  CONTAINERAPP_NAME: todoapp
  IMAGE_NAME: todoapp

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///./ci_test.db"
      SECRET_KEY: "ci-only-placeholder-key"
      ALGORITHM: "HS256"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r Todoapp/requirements.txt

      - name: Run tests
        run: python -m pytest Todoapp/test -v

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push image
        run: |
          IMAGE_TAG=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
          docker build -t $IMAGE_TAG -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest .
          docker push $IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

      - name: Deploy new image to Container App
        run: |
          az containerapp update \
            --name $CONTAINERAPP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
